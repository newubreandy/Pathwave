name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-tests:
    name: Python (backend) — tests/
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests/ files
        # 로컬과 CI 동일 로직: scripts/run_all_tests.sh 호출.
        # tests/.known_broken 에 명시된 pre-existing 실패는 gate 에서 제외.
        env:
          PATHWAVE_TEST_PYTHON: python
        run: |
          chmod +x scripts/run_all_tests.sh
          ./scripts/run_all_tests.sh

  syntax-check:
    name: 문법·플리스트·매니페스트 검증
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: xmllint 설치 (libxml2-utils)
        # ubuntu-latest 러너에 기본 미포함된 경우가 있어 명시 설치.
        run: sudo apt-get update -qq && sudo apt-get install -y libxml2-utils

      - name: Python 문법 (routes/ models/ services/ scripts/)
        run: |
          python -m py_compile $(find routes models services scripts -name '*.py' -type f) && echo "✅ Python 문법 OK"

      - name: iOS Info.plist + PrivacyInfo.xcprivacy (xmllint)
        # Python xml.etree 는 PrivacyInfo 의 멀티라인 코멘트(em-dash 등)에 까다로움.
        # plutil 은 macOS only — Linux CI 에선 xmllint --noout 으로 well-formed 만 확인.
        # 운영 권한·구조 검증은 별도(plutil -lint 로컬 / Xcode Cloud 빌드).
        run: |
          for f in mobile/ios/Runner/Info.plist mobile/ios/Runner/PrivacyInfo.xcprivacy; do
            xmllint --noout "$f" && echo "✅ $f"
          done

      - name: Android AndroidManifest.xml (xmllint)
        run: |
          xmllint --noout mobile/android/app/src/main/AndroidManifest.xml && echo "✅ AndroidManifest XML OK"

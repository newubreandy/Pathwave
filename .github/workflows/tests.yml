name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-tests:
    name: Python (backend) — tests/
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests/ files
        # 로컬과 CI 동일 로직: scripts/run_all_tests.sh 호출.
        # tests/.known_broken 에 명시된 pre-existing 실패는 gate 에서 제외.
        env:
          PATHWAVE_TEST_PYTHON: python
        run: |
          chmod +x scripts/run_all_tests.sh
          ./scripts/run_all_tests.sh

  syntax-check:
    name: 문법·플리스트·매니페스트 검증
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 문법 (routes/ models/ services/ scripts/)
        run: |
          python -m py_compile $(find routes models services scripts -name '*.py' -type f) && echo "✅ Python 문법 OK"

      - name: iOS Info.plist (plutil — Linux 환경에선 XML 검증만)
        run: |
          python -c "
          import xml.etree.ElementTree as ET, sys
          paths = ['mobile/ios/Runner/Info.plist', 'mobile/ios/Runner/PrivacyInfo.xcprivacy']
          for p in paths:
            try:
              ET.parse(p); print(f'✅ {p}')
            except Exception as e:
              print(f'❌ {p}: {e}'); sys.exit(1)
          "

      - name: Android AndroidManifest.xml
        run: |
          xmllint --noout mobile/android/app/src/main/AndroidManifest.xml && echo "✅ AndroidManifest XML OK"
